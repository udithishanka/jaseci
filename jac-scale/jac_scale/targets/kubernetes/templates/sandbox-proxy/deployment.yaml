apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-proxy
  labels:
    app: sandbox-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sandbox-proxy
  template:
    metadata:
      labels:
        app: sandbox-proxy
    spec:
      serviceAccountName: sandbox-proxy
      containers:
        - name: proxy
          image: REPLACE_WITH_IMAGE  # e.g., your-registry/jac-sandbox-proxy:v0.1.0
          ports:
            - containerPort: 8080
          env:
            - name: SANDBOX_NAMESPACE
              value: "jac-sandboxes"
            - name: SANDBOX_LABEL
              value: "jac-sandbox=true"
            - name: INTERNAL_PORT
              value: "8000"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /_proxy/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_proxy/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
