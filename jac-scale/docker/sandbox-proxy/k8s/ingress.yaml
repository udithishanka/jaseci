# Example ingress for sandbox proxy with ALB.
# Customize annotations and host for your deployment.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandbox-proxy-wildcard
  annotations:
    # Replace with your ALB/ingress controller annotations
    alb.ingress.kubernetes.io/group.name: REPLACE_WITH_ALB_GROUP
    alb.ingress.kubernetes.io/group.order: "40"
    alb.ingress.kubernetes.io/certificate-arn: REPLACE_WITH_CERT_ARN
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
spec:
  ingressClassName: alb
  rules:
    - host: "*.example.com"  # Replace with your wildcard domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sandbox-proxy
                port:
                  number: 8080
