[project]
name = "jac-shop"
version = "0.1.0"
description = "A small e-commerce app built as microservices"
entry-point = "main.jac"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]

# Microservice mode — each service runs as its own process
[plugins.scale.microservices]
enabled = true
gateway_port = 8000
gateway_host = "0.0.0.0"

[plugins.scale.microservices.services.products]
file = "products_app.jac"
prefix = "/api/products"

[plugins.scale.microservices.services.orders]
file = "orders_app.jac"
prefix = "/api/orders"

[plugins.scale.microservices.services.cart]
file = "cart_app.jac"
prefix = "/api/cart"

[plugins.scale.microservices.client]
entry = "main.jac"
dist_dir = ".jac/client/dist"
base_route = "/"
