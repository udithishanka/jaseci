[project]
name = "jac-mcp"
version = "0.1.18"
description = "MCP server for AI-assisted Jac development"
authors = [{ name = "Jason Mars", email = "jason@mars.ninja" }]
maintainers = [{ name = "Jason Mars", email = "jason@mars.ninja" }]
license = "MIT"
readme = "README.md"
keywords = ["jac", "jaclang", "jaseci", "mcp", "ai", "model-context-protocol"]
requires-python = ">=3.12"

[project.urls]
repository = "https://github.com/jaseci-labs/jaseci"
homepage = "https://jaseci.org"
documentation = "https://jac-lang.org"
source = "https://github.com/jaseci-labs/jaseci/tree/main/jac-mcp"
issues = "https://github.com/jaseci-labs/jaseci/issues"
changelog = "https://github.com/jaseci-labs/jaseci/blob/main/docs/docs/community/release_notes/jac-mcp.md"

[project.include]
packages = ["jac_mcp*"]

[project.include.data]
jac_mcp = ["content/*.md", "content/docs/*.md", "content/docs/*.spec", "content/docs/*.jac"]

[dependencies]
jaclang = ">=0.15.5"
mcp = ">=1.0.0"

[dev-dependencies]
pytest = ">=8.3.2"
pytest-xdist = "*"
pytest-asyncio = "*"

[entrypoints.jac]
mcp = "jac_mcp.plugin:JacCmd"
mcp_plugin_config = "jac_mcp.plugin_config:JacMcpPluginConfig"
