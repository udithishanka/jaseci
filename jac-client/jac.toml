[project]
name = "jac-client"
version = "0.3.19"
description = "Build full-stack web applications with Jac - one language for frontend and backend."
authors = [{ name = "Jason Mars", email = "jason@mars.ninja" }]
maintainers = [{ name = "Jason Mars", email = "jason@mars.ninja" }]
license = "MIT"
readme = "README.md"
keywords = ["jac", "jaclang", "jaseci", "frontend", "full-stack", "web-development"]
requires-python = ">=3.12"

[project.urls]
repository = "https://github.com/jaseci-labs/jaseci"
homepage = "https://jaseci.org"
documentation = "https://jac-lang.org"
source = "https://github.com/jaseci-labs/jaseci/tree/main/jac-client"
issues = "https://github.com/jaseci-labs/jaseci/issues"
changelog = "https://github.com/jaseci-labs/jaseci/blob/main/docs/docs/community/release_notes/jac-client.md"

[project.include]
packages = ["jac_client*"]

[project.include.data]
"jac_client" = ["templates/**/*", "templates/**/.*"]

[dependencies]
jaclang = ">=0.15.5"

[dev-dependencies]
"python-dotenv" = "==1.0.1"
pytest = "==8.3.5"
watchdog = ">=3.0.0"

[entrypoints.jac]
serve = "jac_client.plugin.client:JacClient"
cli = "jac_client.plugin.cli:JacCmd"
plugin_config = "jac_client.plugin.plugin_config:JacClientPluginConfig"
