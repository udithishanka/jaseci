[project]
name = "{{name}}"
version = "1.0.0"
description = "Jac client application: {{name}}"
entry-point = "main.jac"

[dependencies]

[dependencies.npm]
jac-client-node = "1.0.7"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "1.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]

[jacpack]
name = "client"
description = "Jac project with frontend client setup"
jaclang = "0.9.8"

[[jacpack.plugins]]
name = "jac-client"
version = "0.2.8"

[jacpack.options]
directories = ["components", "assets", ".jac/client"]
post_create_hook = "jac_client.plugin.plugin_config:_post_create_client"
