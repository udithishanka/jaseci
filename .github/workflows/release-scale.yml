name: Release jac-scale to PYPI

on: workflow_dispatch

jobs:
  precompile:
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install jaclang and jac-scale
        run: |
          pip install -e ./jac
          pip install -e "./jac-scale[all]"
      - name: Precompile bytecode
        run: jac run jac/scripts/precompile_bytecode.jac ./jac-scale
      - name: Upload precompiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: precompiled-scale-${{ matrix.python-version }}
          path: jac-scale/jac_scale/_precompiled/

  release-scale:
    name: Release
    needs: precompile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jac-scale

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Download precompiled artifacts
        uses: actions/download-artifact@v4
        with:
          path: jac-scale/jac_scale/_precompiled/
          pattern: precompiled-scale-*
          merge-multiple: true
      - name: Pre-build admin dashboard UI
        run: |
          pip install -e ../jac
          pip install -e ../jac-client
          pip install -e .
          jac run scripts/build_admin_ui.jac
          pip uninstall -y jac-scale jac-client jaclang
      - name: Install build tools
        run: |
          pip install build twine
      - name: Build and publish package
        run: |
          python -m build
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
