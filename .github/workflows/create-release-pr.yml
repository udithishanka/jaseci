name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      # jaclang is the release anchor. It is NOT published to PyPI (it ships as
      # the native `jac` binary); bumping it here edits jac/jac.toml, and on
      # merge the publish workflow creates the v<jaclang> GitHub Release, which
      # fires release-jaclang.yml to build + attach the binaries.
      jaclang:
        description: "jaclang bump (the native binary / release anchor)"
        type: choice
        default: skip
        options: [skip, patch, minor, major]
      # byLLM folded into jaclang (jaclang.byllm) and no longer releases
      # separately to PyPI -- same as the earlier scale fold-in.

permissions: {}

jobs:
  create-release-pr:
    if: github.repository == 'Jaseci-Labs/jaseci'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true
          submodules: true

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Validate versions against PyPI
        run: |
          jac run scripts/validate_release.jac \
            --jaclang "${{ inputs.jaclang }}"

      - name: Bump versions
        id: release
        run: |
          jac run scripts/release.jac \
            --jaclang "${{ inputs.jaclang }}"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and commit
        env:
          BRANCH_NAME: ${{ steps.release.outputs.branch_name }}
          MODIFIED_FILES: ${{ steps.release.outputs.modified_files }}
          PR_TITLE: ${{ steps.release.outputs.pr_title }}
        run: |
          git checkout -b "$BRANCH_NAME"
          git add -A
          git commit -m "$PR_TITLE"
          git push origin "$BRANCH_NAME"

      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ steps.release.outputs.pr_title }}
          PR_BODY: ${{ steps.release.outputs.pr_body }}
          BRANCH_NAME: ${{ steps.release.outputs.branch_name }}
        run: |
          PR_URL=$(gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH_NAME")
          echo "::notice::Release PR created: $PR_URL"

          # CI does NOT run here: the PR is authored by the GITHUB_TOKEN actor, and
          # GitHub blocks workflows triggered by GITHUB_TOKEN from triggering further
          # workflows (anti-recursion), so no pull_request checks attach. A maintainer
          # must CLOSE AND REOPEN the PR so the reopen event comes from a real user;
          # only then do the checks run and attach (enabling auto-merge). See
          # CONTRIBUTING.md "Release Flow". Permanent fix: author the PR with a
          # GitHub App / PAT token instead of GITHUB_TOKEN.
          echo "::notice::Close & reopen this PR to run its checks, then enable auto-merge (see CONTRIBUTING.md)"
