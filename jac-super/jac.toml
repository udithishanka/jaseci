[project]
name = "jac-super"
version = "0.1.15"
description = "Enhanced console output for Jac CLI with Rich formatting"
authors = [{ name = "Jason Mars", email = "jason@mars.ninja" }]
maintainers = [{ name = "Jason Mars", email = "jason@mars.ninja" }]
license = "MIT"
readme = "README.md"
keywords = ["jac", "jaclang", "jaseci", "console", "rich", "cli"]
requires-python = ">=3.12"

[project.urls]
repository = "https://github.com/jaseci-labs/jaseci"
homepage = "https://jaseci.org"
documentation = "https://jac-lang.org"
source = "https://github.com/jaseci-labs/jaseci/tree/main/jac-super"
issues = "https://github.com/jaseci-labs/jaseci/issues"
changelog = "https://github.com/jaseci-labs/jaseci/blob/main/docs/docs/community/release_notes/jac-super.md"

[project.include]
packages = ["jac_super*"]

[project.include.data]
jac_super = [
    "shadcn/templates/**/*",
    "shadcn/templates/**/.*",
    "shadcn/registry/registry.json",
    "shadcn/registry/themes.json",
    "shadcn/registry/components/ui/*.cl.jac",
    "shadcn/registry/styles/*.css",
]

[dependencies]
jaclang = ">=0.15.3"
rich = ">=13.0.0"
"jac-client" = ">=0.1.0"

[entrypoints.jac]
console = "jac_super.plugin.console:JacSuperPlugin"
shadcn = "jac_super.shadcn.plugin:JacShadcnPlugin"
