[project]
name = "{{name}}"
entry-point = "main.jac"

[jac-shadcn]
style = "nova"
baseColor = "neutral"
theme = "neutral"
font = "figtree"
radius = "default"
menuAccent = "subtle"
menuColor = "default"
registry = "https://jac-shadcn.jaseci.org"

[dependencies.npm]
clsx = "^2.1.1"
tailwind-merge = "^3.5.0"
tw-animate-css = "^1.4.0"

[jacpack]
name = "jac-shadcn"
description = "Jac project with shadcn UI components and theming"

[jacpack.options]
directories = ["components", "components/ui", "lib"]
